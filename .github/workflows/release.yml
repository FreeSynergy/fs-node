name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fsn-node-x86_64-linux
            binary: fsn
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: fsn-node-aarch64-linux
            binary: fsn
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: fsn-node-x86_64-macos
            binary: fsn
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: fsn-node-aarch64-macos
            binary: fsn
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: fsn-node-x86_64-windows
            binary: fsn.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cross)
        if: matrix.use_cross == true
        working-directory: cli
        run: cross build --release --target ${{ matrix.target }} --bin fsn

      - name: Build (cargo)
        if: matrix.use_cross != true
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }} --bin fsn

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cp cli/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Copy-Item "cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact }}.exe"
          Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}.${{ matrix.archive }}
