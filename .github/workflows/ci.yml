name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check-cli:
    name: CLI — Format + Clippy + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Checkout fs-libs
        run: git clone --depth=1 "https://x-access-token:${{ secrets.FS_LIBS_TOKEN }}@github.com/FreeSynergy/fs-libs.git" "${{ github.workspace }}/../fs-libs"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cli-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (OOP lints)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::large_enum_variant \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_arguments \
            -D clippy::too_many_lines \
            -D clippy::wildcard_imports \
            -D clippy::unused_self

      - name: Tests
        run: cargo test --workspace

  check-validator:
    name: Validator — Format + Clippy + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            validator/target
          key: ${{ runner.os }}-validator-cargo-${{ hashFiles('validator/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-validator-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (OOP lints)
        run: |
          cargo clippy --workspace --all-targets -- \
            -D clippy::large_enum_variant \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_arguments \
            -D clippy::too_many_lines \
            -D clippy::wildcard_imports \
            -D clippy::unused_self

      - name: Tests
        run: cargo test --workspace

  deny:
    name: Dependency licenses + advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: cli/Cargo.toml

  machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main
        with:
          paths: cli/

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: cli
