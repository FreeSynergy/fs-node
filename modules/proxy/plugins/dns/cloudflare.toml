# FreeSynergy.Node – Cloudflare DNS provider plugin
# File:    modules/proxy/plugins/dns/cloudflare.toml
# Purpose: DNS-01 challenge via Cloudflare API

[plugin]
name        = "cloudflare"
type        = "dns"
description = "Cloudflare DNS API – automatic DNS-01 challenge for ACME certificates"

[vars]
dns_provider  = "cloudflare"
dns_api_url   = "https://api.cloudflare.com/client/v4"
dns_api_token = "{{ vault_cloudflare_dns_api_token }}"
dns_ttl       = "120"
