# Module class definition – maps to modules/observability/otel-collector/otel-collector.toml
#
# Field order (MANDATORY per RULES.md):
#   module → vars → load → container → environment → setup
#
# NOTE: Only one collector per host (per_host = 1).
# Mounts journal for full host observability.

[module]
name        = "otel-collector"
alias       = ["otel", "telemetry"]
type        = "observability"
author      = "FreeSynergy.Node"
version     = "0.0.1"
tags        = ["observability", "opentelemetry", "collector", "logs", "metrics", "traces"]
description = "OpenTelemetry Collector – collects logs, metrics and traces from all platform services"
website     = "https://opentelemetry.io"
repository  = "https://github.com/open-telemetry/opentelemetry-collector-contrib"
port        = 4318

# otel-collector exposes a health-check endpoint on the extensions port
health_path   = "/"
health_port   = 13133
health_scheme = "http"

[module.constraints]
per_host = 1

[vars]
config_dir = "{{ project_root }}/data/{{ instance_name }}"

[load.services.openobserver]

[container]
name      = "{{ instance_name }}"
image     = "ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib"
image_tag = "latest"
volumes   = [
    "{{ module_vars.config_dir }}/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro,Z",
    # Journal logs for container log collection
    "/var/log/journal:/var/log/journal:ro",
    "/run/log/journal:/run/log/journal:ro",
]

[container.healthcheck]
cmd          = "wget --spider -q http://localhost:13133/ || exit 1"
interval     = "30s"
timeout      = "5s"
retries      = 3
start_period = "15s"

# No setup.fields – collector needs no secrets of its own;
# OpenObserver credentials come from the openobserver sub-service.
