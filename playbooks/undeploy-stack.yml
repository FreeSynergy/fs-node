---
# undeploy-stack.yml – Run undeploy hooks then stop all services

- name: "FreeSynergy.Node – Undeploy Stack"
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: true

  vars:
    project_file: "{{ project_config }}"
    fsn_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "Read project file"
      ansible.builtin.include_vars:
        file: "{{ project_file }}"
        name: project_cfg

    - name: "Set project variables"
      ansible.builtin.set_fact:
        project_name: "{{ project_cfg.project.name }}"
        project_domain: "{{ project_cfg.project.domain }}"
        project_root: "{{ fsn_root }}/projects/{{ project_cfg.project.name }}"

    - name: "Read host file"
      ansible.builtin.find:
        paths: "{{ fsn_root }}/hosts"
        patterns: "*.host.yml"
        excludes: "example*"
      register: host_files

    - name: "Load host config"
      ansible.builtin.include_vars:
        file: "{{ host_files.files[0].path }}"
        name: host_cfg
      when: host_files.matched > 0

    - name: "Set host variables (from host file)"
      when: host_files.matched > 0
      ansible.builtin.set_fact:
        host_ip: "{{ host_cfg.host.ip | default('127.0.0.1') }}"
        host_ipv6: "{{ host_cfg.host.ipv6 | default('') }}"
        dns_provider: "{{ host_cfg.host.proxy.zentinel.load.plugins.dns | default('') }}"

    - name: "Set default host variables (no host file found)"
      when: host_files.matched == 0
      ansible.builtin.set_fact:
        host_ip: "127.0.0.1"
        host_ipv6: ""
        dns_provider: ""

    - name: "Check if vault file exists"
      ansible.builtin.stat:
        path: "{{ project_root }}/vault.yml"
      register: vault_file

    - name: "Load vault variables"
      ansible.builtin.include_vars:
        file: "{{ project_root }}/vault.yml"
      no_log: true
      when: vault_file.stat.exists

    - name: "Set DNS API token from vault"
      ansible.builtin.set_fact:
        dns_api_token: >-
          {{ vault_hetzner_dns_token
             if dns_provider == 'hetzner'
             else vault_cloudflare_api_token
             if dns_provider == 'cloudflare'
             else '' }}

    - name: "Build project services list for DNS hooks"
      ansible.builtin.set_fact:
        project_services: "{{ project_services | default([]) + [{'subdomain': _svc.key, 'aliases': _svc.value.aliases | default([])}] }}"
      loop: "{{ project_cfg.load.modules | dict2items }}"
      loop_control:
        loop_var: _svc
        label: "{{ _svc.key }}"

    - name: "Run undeploy hooks then stop each module"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/undeploy-module.yml"
      loop: "{{ project_cfg.load.modules | dict2items | reverse | list }}"
      loop_control:
        loop_var: module_entry
        label: "{{ module_entry.key }}"
