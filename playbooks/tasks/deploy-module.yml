---
# Task: Deploy a single module instance
# Variables: module_entry (dict with key=instance_name, value=module config)

- name: "Set module variables for {{ module_entry.key }}"
  ansible.builtin.set_fact:
    instance_name: >-
      {{ (parent_instance_name ~ '-' ~ module_entry.key)
         if (parent_instance_name | default('') | length > 0)
         else module_entry.key }}
    module_class: "{{ module_entry.value.module_class }}"
    module_path: "{{ fsn_root }}/modules/{{ module_entry.value.module_class }}"
    service_domain: "{{ module_entry.key }}.{{ project_domain }}"

- name: "Read module class file"
  ansible.builtin.include_vars:
    file: "{{ module_path }}/{{ module_class | basename }}.yml"
    name: module_cfg

- name: "Extract module sections into separate variables"
  ansible.builtin.set_fact:
    module: "{{ module_cfg.module }}"
    container: "{{ module_cfg.container }}"
    module_environment: "{{ module_cfg.environment | default({}) }}"
    healthcheck: "{{ module_cfg.container.healthcheck | default(omit) }}"
    module_vars: "{{ module_cfg.vars | default({}) }}"

# ── Build 'services' lookup dict ─────────────────────────────────────────────
# Populated BEFORE sub-modules deploy so hooks/templates can reference
# services.kanidm.domain, services.postgres.container_name, etc.

- name: "Initialise services dict"
  ansible.builtin.set_fact:
    services: "{{ services | default({}) }}"

- name: "Resolve sub-module into services dict"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/resolve-service.yml"
  loop: "{{ module_cfg.load.modules | default({}) | dict2items }}"
  loop_control:
    loop_var: _svc_entry
    label: "{{ _svc_entry.key }}"
  vars:
    _svc_name: "{{ _svc_entry.key }}"
    _svc_class: "{{ _svc_entry.value.module_class }}"
    _svc_container: "{{ instance_name }}-{{ _svc_entry.key }}"

- name: "Resolve external service dependency into services dict"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/resolve-service.yml"
  loop: "{{ module_cfg.load.services | default({}) | dict2items }}"
  loop_control:
    loop_var: _svc_entry
    label: "{{ _svc_entry.key }}"
  vars:
    _svc_name: "{{ _svc_entry.key }}"
    _svc_class: >-
      {{ (project_cfg.load.modules | default({}))[_svc_entry.key].module_class | default('') }}
    _svc_container: "{{ _svc_entry.key }}"
  when: module_cfg.load.services | default({}) | length > 0

# ─────────────────────────────────────────────────────────────────────────────

- name: "Check if module is external"
  when: module_entry.value.external | default(false)
  block:
    - name: "Skip deployment for external module {{ module_entry.key }}"
      ansible.builtin.debug:
        msg: "Module {{ instance_name }} is external – skipping container deployment"

- name: "Deploy module {{ instance_name }}"
  when: not (module_entry.value.external | default(false))
  block:
    - name: "Ensure data directory exists"
      ansible.builtin.file:
        path: "{{ project_root }}/data/{{ instance_name }}"
        state: directory
        mode: "0755"

    - name: "Ensure config directory exists"
      ansible.builtin.file:
        path: "{{ project_root }}/configs/{{ instance_name }}"
        state: directory
        mode: "0755"

    - name: "Deploy sub-modules"
      when: module_cfg.load.modules | default({}) | length > 0
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy-module.yml"
      loop: "{{ module_cfg.load.modules | dict2items }}"
      loop_control:
        loop_var: sub_module_entry
        label: "{{ sub_module_entry.key }}"
      vars:
        parent_instance_name: "{{ instance_name }}"
        module_entry: "{{ sub_module_entry }}"

    - name: "Generate Quadlet"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/generate-quadlet.yml"
      vars:
        container_dependencies: >-
          {{ module_cfg.load.modules | default({}) | list
             | map('regex_replace', '(.*)', instance_name ~ '-\1')
             | list }}

    - name: "Reload systemd user daemon"
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: "Start service {{ instance_name }}"
      ansible.builtin.systemd:
        name: "{{ instance_name }}.service"
        state: started
        enabled: true
        scope: user

    - name: "Run deploy hooks"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/run-module-hooks.yml"
      vars:
        hook_phase: "deploy"

    - name: "Record deployed version"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/record-deployed-version.yml"
