---
# Task: Resolve one service entry into the 'services' fact.
#
# For sub-modules (database/postgres, cache/dragonfly …):
#   reads the module YAML to extract port, db_name, db_user.
# For external services (kanidm, …):
#   derives domain from project_domain; no YAML read needed.
#
# Variables (caller must pass via vars:):
#   _svc_name      – service instance key, e.g. "postgres", "kanidm"
#   _svc_class     – module class path, e.g. "database/postgres"; empty for external
#   _svc_container – actual container name; for sub-modules = "parent-svcname",
#                    for external services = svc_name unchanged

- name: "Read module YAML for service {{ _svc_name }}"
  ansible.builtin.include_vars:
    file: "{{ fsn_root }}/modules/{{ _svc_class }}/{{ _svc_class | basename }}.yml"
    name: _svc_cfg
  when: _svc_class | default('') | length > 0
  failed_when: false

- name: "Add {{ _svc_name }} to services dict"
  ansible.builtin.set_fact:
    services: >-
      {{ services | default({}) | combine({_svc_name: {
        'container_name': _svc_container | default(_svc_name),
        'domain': _svc_name + '.' + project_domain,
        'port': (_svc_cfg.module.port | default(0)) | int,
        'db_name': instance_name,
        'db_user': instance_name,
        'vault_db_password': vault_db_password | default(''),
        'vault_cache_password': vault_cache_password | default('')
      }}) }}
