---
# Task: Check module constraints for a single module
# Variables: module_entry (dict with key=instance_name, value=module config)
#            desired_modules (full module list, set by caller)
#
# Enforces:
#   per_host  – max N instances of this module class per host (ENFORCED)
#   per_ip    – max N per IP address (SKIPPED: requires multi-host context)
#   locality  – same_host sub-module placement (SKIPPED: enforced during deploy)

- name: "Read module class for constraint check"
  ansible.builtin.include_vars:
    file: >-
      {{ fsn_root }}/modules/{{ module_entry.value.module_class
      }}/{{ module_entry.value.module_class | basename }}.yml
    name: constraint_module_cfg
  failed_when: false

- name: "Enforce constraints"
  when: constraint_module_cfg is defined
  block:

    # ── per_host ───────────────────────────────────────────────────────────────

    - name: "per_host: count instances of same class"
      ansible.builtin.set_fact:
        _constraint_same_class: >-
          {{ desired_modules
             | selectattr('value.module_class', 'equalto', module_entry.value.module_class)
             | list }}
      when:
        - constraint_module_cfg.module.constraints is defined
        - constraint_module_cfg.module.constraints.per_host is defined
        - constraint_module_cfg.module.constraints.per_host is not none

    - name: "per_host: fail if limit exceeded"
      ansible.builtin.assert:
        that:
          - _constraint_same_class | length <=
            (constraint_module_cfg.module.constraints.per_host | int)
        fail_msg: >-
          Constraint violation: '{{ module_entry.value.module_class }}'
          has per_host={{ constraint_module_cfg.module.constraints.per_host }}
          but {{ _constraint_same_class | length }} instance(s) found:
          {{ _constraint_same_class | map(attribute='key') | join(', ') }}.
      when:
        - _constraint_same_class is defined

    # ── per_ip ─────────────────────────────────────────────────────────────────

    - name: "per_ip: skipped in single-host mode"
      ansible.builtin.debug:
        msg: >-
          per_ip constraint for '{{ module_entry.key }}' not checked
          (requires multi-host context – planned for v0.2).
      when:
        - constraint_module_cfg.module.constraints is defined
        - constraint_module_cfg.module.constraints.per_ip is defined
        - constraint_module_cfg.module.constraints.per_ip is not none
