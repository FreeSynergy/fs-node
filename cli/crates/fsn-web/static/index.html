<!DOCTYPE html>
<html lang="en" x-data="fsn()" x-init="load()">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreeSynergy.Node</title>
  <script src="https://unpkg.com/htmx.org@2.0.2" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; }
    header { background: #1a1d27; border-bottom: 1px solid #2d3148;
             padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #a78bfa; }
    main { padding: 2rem; max-width: 960px; margin: 0 auto; }
    h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; text-transform: uppercase;
         letter-spacing: .05em; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: .5rem 1rem; color: #64748b; font-size: .8rem;
         text-transform: uppercase; border-bottom: 1px solid #2d3148; }
    td { padding: .75rem 1rem; border-bottom: 1px solid #1e2130; }
    .badge { display: inline-block; padding: .15rem .6rem; border-radius: 9999px;
             font-size: .75rem; font-weight: 600; }
    .active   { background: #14532d; color: #4ade80; }
    .inactive { background: #1e293b; color: #94a3b8; }
    .failed   { background: #7f1d1d; color: #f87171; }
    button { padding: .3rem .8rem; border-radius: .375rem; border: none; cursor: pointer;
             font-size: .8rem; font-weight: 600; }
    .btn-restart { background: #3730a3; color: #fff; }
    .btn-stop    { background: #4b1010; color: #fca5a5; }
    .btn-start   { background: #14532d; color: #86efac; }
    button:hover { filter: brightness(1.2); }
  </style>
</head>
<body>
  <header>
    <h1>FreeSynergy.Node</h1>
    <span style="color:#64748b;font-size:.85rem">Management UI</span>
  </header>

  <main>
    <h2>Services</h2>
    <table>
      <thead>
        <tr><th>Name</th><th>State</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <template x-for="svc in services" :key="svc.name">
          <tr>
            <td x-text="svc.name"></td>
            <td>
              <span class="badge" :class="svc.state" x-text="svc.state"></span>
            </td>
            <td style="display:flex;gap:.5rem">
              <button class="btn-restart" @click="action('restart', svc.name)">Restart</button>
              <button class="btn-stop"    @click="action('stop',    svc.name)">Stop</button>
              <button class="btn-start"   @click="action('start',   svc.name)">Start</button>
            </td>
          </tr>
        </template>
        <tr x-show="services.length === 0">
          <td colspan="3" style="color:#64748b;text-align:center;padding:2rem">
            No services found.
          </td>
        </tr>
      </tbody>
    </table>
  </main>

  <script>
    function fsn() {
      return {
        services: [],
        async load() {
          const r = await fetch('/api/status');
          this.services = await r.json();
        },
        async action(verb, name) {
          await fetch(`/api/${verb}/${name}`, { method: 'POST' });
          await this.load();
        }
      };
    }
  </script>
</body>
</html>
